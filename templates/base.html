
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Créez votre site de salon de coiffure et beauté en 24h. Gérez tous vos établissements depuis une seule plateforme.">
<title>{% block title %}SalonPro — Votre site de salon prêt en 24h{% endblock %}</title>

<!-- Google Fonts : Premium typography -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
'display': ['Playfair Display', 'serif'],
'sans': ['Inter', 'sans-serif'],
            },
            colors: {
'gold': '#C9A961',
'gold-light': '#E5C77B',
'dark': '#0A0A0A',
'dark-soft': '#1A1A1A',
            }
          }
        }
      }
</script>

<!-- Bootstrap (utilitaires uniquement, pas de conflit) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap-grid.min.css" rel="stylesheet">

<!-- Iconify -->
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>

<!-- Custom CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="font-sans bg-white text-dark antialiased">
    {% block content %}{% endblock %}

<!-- Custom JS -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
